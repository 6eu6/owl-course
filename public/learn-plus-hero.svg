<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Learn Plus Courses hero artwork</title>
  <desc id="desc">English hero artwork for a free Udemy course discovery platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="1" stop-color="#f8fafc" stop-opacity=".92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="1080" cy="70" r="190" fill="#a855f7" opacity=".22"/>
  <circle cx="90" cy="350" r="170" fill="#22c55e" opacity=".18"/>
  <path d="M70 82h295" stroke="#fff" stroke-opacity=".12" stroke-width="1"/>
  <path d="M855 352h280" stroke="#fff" stroke-opacity=".12" stroke-width="1"/>

  <g transform="translate(76 74)">
    <rect x="0" y="0" width="122" height="36" rx="18" fill="#ffffff" fill-opacity=".12" stroke="#ffffff" stroke-opacity=".16"/>
    <text x="18" y="23" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">LEARN PLUS</text>
    <text x="0" y="86" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff" letter-spacing="-.8">Free Udemy courses</text>
    <text x="0" y="130" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff" letter-spacing="-.8">updated automatically</text>
    <text x="2" y="176" font-family="Inter, Arial, sans-serif" font-size="19" fill="#cbd5e1">Discover quality online courses with 100% coupons. Browse, pick, and enroll while the offer is active.</text>
    <g transform="translate(0 220)">
      <rect width="156" height="44" rx="14" fill="#ffffff"/>
      <text x="24" y="28" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#111827">Browse courses</text>
      <rect x="172" width="148" height="44" rx="14" fill="transparent" stroke="#ffffff" stroke-opacity=".30"/>
      <text x="196" y="28" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Fresh coupons</text>
    </g>
  </g>

  <g transform="translate(705 78)" filter="url(#shadow)">
    <rect x="0" y="36" width="360" height="230" rx="26" fill="url(#card)"/>
    <rect x="24" y="62" width="312" height="88" rx="18" fill="#111827"/>
    <text x="48" y="98" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#ffffff">Udemy</text>
    <text x="48" y="126" font-family="Inter, Arial, sans-serif" font-size="14" fill="#d1d5db">100% coupon applied</text>
    <rect x="24" y="168" width="150" height="68" rx="16" fill="#f1f5f9"/>
    <text x="44" y="196" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#0f172a">Python</text>
    <text x="44" y="218" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">Free today</text>
    <rect x="186" y="168" width="150" height="68" rx="16" fill="#f1f5f9"/>
    <text x="206" y="196" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#0f172a">React</text>
    <text x="206" y="218" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">Coupon live</text>
  </g>

  <g transform="translate(650 48)">
    <rect width="120" height="42" rx="21" fill="#a435f0"/>
    <text x="29" y="27" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900" fill="#ffffff">Udemy</text>
  </g>
</svg>
