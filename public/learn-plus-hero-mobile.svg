<svg xmlns="http://www.w3.org/2000/svg" width="420" height="560" viewBox="0 0 420 560" role="img" aria-labelledby="title desc">
  <title id="title">Learn Plus Courses mobile hero artwork</title>
  <desc id="desc">Mobile friendly hero artwork for a free Udemy course discovery platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="420" height="560" rx="28" fill="url(#bg)"/>
  <circle cx="355" cy="56" r="118" fill="#a855f7" opacity=".24"/>
  <circle cx="46" cy="500" r="128" fill="#22c55e" opacity=".18"/>

  <g transform="translate(32 42)">
    <rect width="118" height="34" rx="17" fill="#ffffff" fill-opacity=".12" stroke="#ffffff" stroke-opacity=".16"/>
    <text x="17" y="22" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#ffffff">LEARN PLUS</text>

    <text x="0" y="102" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#ffffff" letter-spacing="-.8">Free Udemy</text>
    <text x="0" y="144" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#ffffff" letter-spacing="-.8">courses</text>
    <text x="0" y="186" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#ffffff" letter-spacing="-.8">updated daily</text>

    <text x="0" y="226" font-family="Inter, Arial, sans-serif" font-size="15" fill="#cbd5e1">Discover quality courses with</text>
    <text x="0" y="249" font-family="Inter, Arial, sans-serif" font-size="15" fill="#cbd5e1">100% coupons before they expire.</text>

    <g transform="translate(0 282)">
      <rect width="158" height="44" rx="14" fill="#ffffff"/>
      <text x="22" y="28" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="#111827">Browse courses</text>
      <rect x="172" width="118" height="44" rx="14" fill="transparent" stroke="#ffffff" stroke-opacity=".30"/>
      <text x="194" y="28" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#ffffff">Coupons</text>
    </g>
  </g>

  <g transform="translate(34 390)" filter="url(#shadow)">
    <rect width="352" height="122" rx="22" fill="#ffffff"/>
    <rect x="18" y="18" width="122" height="86" rx="16" fill="#111827"/>
    <text x="40" y="56" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900" fill="#ffffff">Udemy</text>
    <text x="40" y="80" font-family="Inter, Arial, sans-serif" font-size="11" fill="#d1d5db">coupon applied</text>

    <rect x="158" y="18" width="78" height="38" rx="12" fill="#f1f5f9"/>
    <text x="176" y="42" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900" fill="#0f172a">Python</text>
    <rect x="248" y="18" width="78" height="38" rx="12" fill="#f1f5f9"/>
    <text x="268" y="42" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900" fill="#0f172a">React</text>
    <rect x="158" y="66" width="168" height="38" rx="12" fill="#ecfdf5"/>
    <text x="188" y="90" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900" fill="#166534">100% free today</text>
  </g>
</svg>
